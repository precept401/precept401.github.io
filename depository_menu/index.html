<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>[DEPOSITORY MENU] — Precept401</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(to right, #4c768c, #061113);
            color: #5ab99b;
            font-family: 'Courier New', monospace;
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
            text-align: center;
        }

        /* ЗАГОЛОВОК (ТИТУЛЬНИК) */
        .title {
            margin-bottom: 50px;
        }

        .title h1 {
            font-size: 48px;
            color: #5ab99b;
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        .title p {
            font-size: 16px;
            opacity: 0.8;
        }

        /* МЕНЮ */
        .lab-menu {
            display: flex;
            justify-content: center;
            gap: 60px;
            flex-wrap: wrap;
            margin: 40px 0;
        }

        /* КАЖДЫЙ ПУНКТ МЕНЮ — КОНТЕЙНЕР ДЛЯ ВЫПАДАЮЩЕГО СПИСКА */
        
        .dropdown-content a {
            color: #5ab99b;
            font-size: 16px;
            font-family: 'Courier New', monospace;
            font-weight: normal;
            padding: 12px 20px;
            text-decoration: none;
            display: block;
            transition: all 0.2s ease;
            border-radius: 10px;
       }

       .dropdown-content a:hover {
           background-color: #5ab99b;
           color: #061113;
       }

        .dropdown {
            position: relative;
            display: inline-block;
        }

        /* КНОПКА МЕНЮ */
        .lab-button {
            background-color: #0d1b1e;
            color: #5ab99b;
            padding: 18px 36px;
            font-size: 24px;
            font-weight: bold;
            text-decoration: none;
            border: 1px solid #5ab99b;
            border-radius: 20px;
            transition: all 0.2s ease;
            cursor: pointer;
            display: inline-block;
        }

        .lab-button:hover {
            background-color: #5ab99b;
            color: #061113;
        }

        .dropdown-content {
            position: absolute;
            background-color: #0d1b1e;
            min-width: 250px;
            border: 1px solid #5ab99b;
            border-radius: 15px;
            z-index: 1;
            margin-top: 10px;
            left: 0;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0s linear 0.3s, opacity 0.3s linear;
        }

        .dropdown:hover .dropdown-content {
            visibility: visible;
            opacity: 1;
            transition: visibility 0s linear 0s, opacity 0.3s linear;
        }

        /* АДАПТАЦИЯ ПОД ТЕЛЕФОН */
max-width: 600px {
    .lab-menu {
        flex-direction: column;
        align-items: center;
        gap: 20px;
    }
    
    .lab-button {
        padding: 12px 24px;
        font-size: 18px;
    }
    
    .dropdown-content {
        position: static;
        margin-top: 5px;
    }
    
    .title h1 {
        font-size: 32px;
    }
    
    .lab-dot-button {
        width: 40px;
        height: 40px;
        font-size: 20px;
    }
}

        @keyframes noise {
               0% { transform: translate(0, 0); opacity: 0.3; }
              10% { transform: translate(-1%, -1%); opacity: 0.4; }
              20% { transform: translate(1%, 1%); opacity: 0.3; }
              30% { transform: translate(-1%, 1%); opacity: 0.5; }
              40% { transform: translate(1%, -1%); opacity: 0.3; }
              50% { transform: translate(0, 0); opacity: 0.4; }
              60% { transform: translate(-1%, -1%); opacity: 0.3; }
              70% { transform: translate(1%, 1%); opacity: 0.5; }
              80% { transform: translate(-1%, 1%); opacity: 0.3; }
              90% { transform: translate(1%, -1%); opacity: 0.4; }
             100% { transform: translate(0, 0); opacity: 0.3; }
        }

        body::after {
                content: "";
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                pointer-events: none;
                z-index: 9998;
                background: repeating-linear-gradient(0deg, rgba(0,255,0,0.05) 0px, rgba(0,255,0,0.05) 2px, transparent 4px, transparent 10px);
                animation: noise 1.8s infinite;
       }

       @keyframes glitch {
                0% { transform: translate(0); }
               95% { transform: translate(0); }
               96% { transform: translate(-2px, 2px); }
               97% { transform: translate(2px, -2px); }
               98% { transform: translate(0, 0); }
               99% { transform: translate(0, 0); }
              100% { transform: translate(0); }
      }

      body {
               overflow-x: hidden;
      }

        /* КРУЖОК С ТОЧКАМИ */
        .lab-dot-nav {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
        }

        .lab-dot-button {
            width: 50px;
            height: 50px;
            background-color: #0d1b1e;
            border: 2px solid #5ab99b;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: #5ab99b;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .lab-dot-button:hover {
            background-color: #5ab99b;
            color: #061113;
        }

        .lab-dot-menu {
            position: relative;
            display: inline-block;
        }

        .lab-menu-items {
            position: absolute;
            top: 0;
            left: 60px;
            background-color: rgba(13, 27, 30, 0.95);
            border: 1px solid #5ab99b;
            border-radius: 30px;
            padding: 8px 20px;
            white-space: nowrap;
            backdrop-filter: blur(5px);
            transition: visibility 0s linear 0.5s, opacity 0.3s linear;
            opacity: 0;
            visibility: hidden;
        }

        .lab-dot-menu:hover .lab-menu-items {
            visibility: visible;
            opacity: 1;
            transition: visibility 0s linear 0s, opacity 0.3s linear;
        }

        .lab-menu-items a {
            color: #5ab99b;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            padding: 6px 12px;
            display: inline-block;
            transition: all 0.2s ease;
            border-radius: 20px;
        }

        .lab-menu-items a:hover {
            background-color: #5ab99b;
            color: #000000;
        }

        /* КНОПКА ЗВУКА (ВЕРХНИЙ ПРАВЫЙ УГОЛ) */
        .sound-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background-color: #0d1b1e;
            border: 2px solid #5ab99b;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            z-index: 1000;
            transition: all 0.2s ease;
        }

        .sound-btn:hover {
            background-color: #5ab99b;
            color: #061113;
        }
        
    </style>
</head>
<body>

<div class="container">
    <!-- ТИТУЛЬНИК -->
    <div class="title">
        <h1>[DEPOSITORY MENU]</h1>
        <p>material · manufacturability · archaism</p>
    </div>

    <!-- КНОПКА ЗВУКА (СПРАВА) -->
    <div id="soundControl" class="sound-btn">🔊</div>

    <!-- КРУЖОК С ТОЧКАМИ И ВЫПАДАЮЩИМ МЕНЮ -->
    <div class="lab-dot-nav">
        <div class="lab-dot-menu">
            <div class="lab-dot-button">•••</div>
            <div class="lab-menu-items">
                <a href="index.html">[HOME]</a>
                <a href="lab_menu/">[LAB]</a>
                <a href="liquid_emptiness_menu/">[LIQUID EMPTINESS]</a>
                <a href="hub/">[HUB]</a>
            </div>
        </div>
    </div>

    <!-- МЕНЮ С ВЫПАДАЮЩИМИ СПИСКАМИ -->
    <div class="lab-menu">
        <!-- Кнопка 1 -->
        <div class="dropdown">
            <div class="lab-button">[HANDMADE ARTIFACTS] ▼</div>
            <div class="dropdown-content">
                <a href="quarry.html">[QUARRY]</a>
                <a href="abduction.html">[ABDUCTION]</a>
            </div>
        </div>

        <!-- Кнопка 2 -->
        <div class="dropdown">
            <div class="lab-button">[TECHNO ARTIFACTS] ▼</div>
            <div class="dropdown-content">
                <a href="archo_key.html">[ARCHO KEY]</a>
            </div>
        </div>

    </div>
</div>

        <script>
       // КНОПКА ЗВУКА
       const soundBtn = document.getElementById('soundControl');

       // ПОЛУЧАЕМ СОСТОЯНИЕ ИЗ ХРАНИЛИЩА (ЕСЛИ ЕСТЬ)
       let isSoundOn = localStorage.getItem('isSoundOn') !== 'false';

       // СОЗДАЁМ АУДИО (ОДИН РАЗ)
       const audio = new Audio('/precept401/sounds/atmo.mp3');
       audio.loop = true;

       // УСТАНАВЛИВАЕМ ГРОМКОСТЬ (ПО ЖЕЛАНИЮ)
       audio.volume = 0.1;

       // ФУНКЦИЯ ОБНОВЛЕНИЯ ИКОНКИ И СОСТОЯНИЯ
       function updateSoundButton() {
       if (isSoundOn) {
        soundBtn.textContent = '🔊';
        audio.play().catch(e => console.log('Автовоспроизведение заблокировано:', e));
       } else {
        soundBtn.textContent = '🔇';
        audio.pause();
       }
    }

       // ПРОВЕРЯЕМ, НУЖНО ЛИ ВОСПРОИЗВОДИТЬ ПРИ ЗАГРУЗКЕ
       updateSoundButton();

       // ОБРАБОТЧИК КЛИКА
       soundBtn.addEventListener('click', () => {
          isSoundOn = !isSoundOn;
          localStorage.setItem('isSoundOn', isSoundOn);
          updateSoundButton();
        });
    </script>

</body>
</html>
