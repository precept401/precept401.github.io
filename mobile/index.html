<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Precept401 — цифровая среда</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(to right, #4c768c, #061113);
            color: #5ab99b;
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 20px 20px 40px;
        }

        .screen {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            justify-content: center;
            min-height: 80vh;
        }

        /* ПЕЧАТЬ — крупная, по центру */
        .seal {
            width: 80%;
            max-width: 340px;
            aspect-ratio: 1 / 1;
            background-color: #000000;
            border: 2px solid #5ab99b;
            border-radius: 2px;
            box-shadow: 0 0 30px rgba(90, 185, 155, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 10px auto 30px;
            overflow: hidden;
        }

        .seal img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        /* МЕНЮ — кнопки в столбик на всю ширину */
        .menu-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
            width: 100%;
            margin-bottom: 30px;
        }

        .sensor {
            display: inline-block;
            text-decoration: none;
            color: #5ab99b;
            font-size: 20px;
            font-weight: bold;
            text-transform: uppercase;
            background-color: #0d1b1e;
            border: 1px solid #5ab99b;
            border-radius: 30px;
            padding: 16px 20px;
            width: 100%;
            max-width: 320px;
            text-align: center;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .sensor:active {
            background-color: #5ab99b;
            color: #061113;
            transform: scale(0.96);
        }

        .scroll-hint {
            font-size: 12px;
            opacity: 0.6;
            margin-top: 10px;
        }

        .hidden-text {
            width: 100%;
            max-width: 480px;
            margin-top: 40px;
            padding: 20px 0;
            display: flex;
            justify-content: center;
        }

        .card {
            background-color: #0d1b1e;
            padding: 30px 24px;
            border-radius: 30px;
            border: 1px solid #5ab99b;
            text-align: center;
        }

        .card h2 {
            font-size: 22px;
            margin-bottom: 12px;
        }

        .card p {
            font-size: 15px;
            line-height: 1.5;
            opacity: 0.9;
        }

        .card p + p {
            margin-top: 12px;
        }

        /* КНОПКА ЗВУКА — без изменений, просто оставлена */
        .sound-btn {
            position: fixed;
            top: 16px;
            right: 16px;
            width: 44px;
            height: 44px;
            background-color: #0d1b1e;
            border: 2px solid #5ab99b;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            z-index: 1000;
            transition: all 0.2s ease;
        }

        .sound-btn:active {
            background-color: #5ab99b;
            color: #061113;
            transform: scale(0.92);
        }

        /* ШУМ */
        @keyframes noise {
            0% { transform: translate(0, 0); opacity: 0.3; }
            10% { transform: translate(-1%, -1%); opacity: 0.4; }
            20% { transform: translate(1%, 1%); opacity: 0.3; }
            30% { transform: translate(-1%, 1%); opacity: 0.5; }
            40% { transform: translate(1%, -1%); opacity: 0.3; }
            50% { transform: translate(0, 0); opacity: 0.4; }
            60% { transform: translate(-1%, -1%); opacity: 0.3; }
            70% { transform: translate(1%, 1%); opacity: 0.5; }
            80% { transform: translate(-1%, 1%); opacity: 0.3; }
            90% { transform: translate(1%, -1%); opacity: 0.4; }
            100% { transform: translate(0, 0); opacity: 0.3; }
        }

        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9998;
            background: repeating-linear-gradient(0deg, rgba(0,255,0,0.05) 0px, rgba(0,255,0,0.05) 2px, transparent 4px, transparent 10px);
            animation: noise 1.8s infinite;
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            95% { transform: translate(0); }
            96% { transform: translate(-2px, 2px); }
            97% { transform: translate(2px, -2px); }
            98% { transform: translate(0, 0); }
            99% { transform: translate(0, 0); }
            100% { transform: translate(0); }
        }

        body {
            animation: glitch 12s infinite;
            overflow-x: hidden;
        }
    </style>
</head>
<body>

    <div class="screen">
        <!-- ПЕЧАТЬ -->
        <div class="seal">
            <img src="images/seal.png" alt="Печать precept401">
        </div>

        <!-- КНОПКА ЗВУКА -->
        <div id="soundControl" class="sound-btn">🔊</div>

        <!-- МЕНЮ -->
        <div class="menu-panel">
            <a href="lab_menu/" class="sensor">[Lab]</a>
            <a href="liquid_emptiness_menu/" class="sensor">[Liquid emptiness]</a>
            <a href="depository_menu/" class="sensor">[Depository]</a>
            <a href="hub/" class="sensor">[Hub]</a>
        </div>

        <p class="scroll-hint">↓ скролл вниз ↓</p>
    </div>

    <div class="hidden-text">
        <div class="card">
            <h2>В этом пространстве</h2>
            <p>обозревают реальность как целое, обмениваются ценностью и открывают новые взаимовыгодные пути.</p>
            <p>Здесь нету места играм по чужим сценариям - здесь строят экосистему.</p>
        </div>
    </div>

    <script>
        const soundBtn = document.getElementById('soundControl');
        let isSoundOn = localStorage.getItem('isSoundOn') !== 'false';

        const audio = new Audio('sounds/atmo.mp3');
        audio.loop = true;
        audio.volume = 0.1;

        function updateSoundButton() {
            if (isSoundOn) {
                soundBtn.textContent = '🔊';
                audio.play().catch(e => console.log('Автовоспроизведение заблокировано:', e));
            } else {
                soundBtn.textContent = '🔇';
                audio.pause();
            }
        }

        updateSoundButton();

        soundBtn.addEventListener('click', () => {
            isSoundOn = !isSoundOn;
            localStorage.setItem('isSoundOn', isSoundOn);
            updateSoundButton();
        });
    </script>

</body>
</html>
